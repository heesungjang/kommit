version: 2

project_name: kommit

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: kommit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/heesungjang/kommit/internal/version.Version={{.Version}}
      - -X github.com/heesungjang/kommit/internal/version.Commit={{.Commit}}
      - -X github.com/heesungjang/kommit/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: heesungjang
    name: kommit
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
